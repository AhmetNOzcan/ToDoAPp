name: todo_lite
description: "Todo Lite — lightweight todo app, todos only."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  core: 0.0.1
  todo_feature_presentation: 0.0.1
  todo_feature_navigation: 0.0.1
  go_router: ^14.8.1
  get_it: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
